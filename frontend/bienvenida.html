<!DOCTYPE html>
<html lang="es" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <!-- 📱 ESTA LÍNEA ES LA QUE HACE QUE NO SE VEA PEQUEÑO EN EL CELULAR/LIVE SERVER -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jaqaku Café</title>
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #18405c;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .logo-img {
            height: 110px;
            width: auto;
            margin-bottom: 15px;
            object-fit: contain;
        }
        h1 {
            font-family: 'Parisienne', cursive;
            font-size: 3.5rem;
            margin: 0;
            color: #ffffff;
        }
        .slogan {
            font-size: 1.1rem;
            font-style: italic;
            color: #e2e8f0;
            margin-top: 5px;
            margin-bottom: 2.5rem;
        }
        .contenedor-botones {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 300px;
        }
        .btn-opcion {
            background-color: #ffffff;
            color: #18405c;
            border: none;
            padding: 16px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-opcion:active {
            transform: scale(0.97);
        }
        .btn-funcionario {
            background-color: transparent;
            color: #ffffff;
            border: 2px solid #ffffff;
            box-shadow: none;
        }
    </style>
</head>
<body>

    <img src="logo.png" alt="Logo Jaqaku" class="logo-img">
    <h1>Jaqaku</h1>
    <p class="slogan">Un café con alma boliviana</p>

    <div class="contenedor-botones">
        <button class="btn-opcion" onclick="window.location.href='/cliente'">✨ ¿Cliente?</button>
        <button class="btn-opcion btn-funcionario" onclick="window.location.href='/barista'">☕ ¿Funcionario?</button>
    </div>

</body>
</html>
