<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#18405c">
    <title>Café Rewards</title>
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Parisienne&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="app-container">
        <header>
            <img src="./logo.png" alt="" class="logo" style="max-width: 150px;" id="logo-marca">
            <h1 class="brand-name" id="brand-heading">Café Rewards</h1>
            <p id="brand-tagline">Programa de fidelidad</p>
        </header>

        <section id="view-register" class="card">
            <h2>Gestión de cliente</h2>
            <form id="form-registro">
                <input type="text" id="nombre" name="nombre" placeholder="Nombre" required>
                <input type="text" id="apellido" name="apellido" placeholder="Apellido" required>
                <input type="tel" id="celular" name="celular" placeholder="Celular (obligatorio)" required>
                <input type="email" id="correo" name="correo" placeholder="Correo electrónico (obligatorio)" required>

                <div style="text-align: left; margin: 10px 0;">
                    <label for="fecha_nacimiento">Fecha de nacimiento</label>
                    <input type="date" id="fecha_nacimiento" name="fecha_nacimiento" required>
                </div>

                <div class="button-row">
                    <button type="submit" class="btn-registrar">Registrar</button>
                    <button type="button" class="btn-buscar" id="btn-buscar">Buscar por nombre</button>
                </div>

                <button type="button" class="btn-limpiar" id="btn-limpiar">Siguiente cliente / limpiar</button>
            </form>
        </section>

        <section id="view-client" class="card points-section">
            <h3>Estado del cliente</h3>
            <div id="display-nombre-cliente" class="cliente-info-display">Esperando selección…</div>

            <div id="info-contacto-cliente" style="margin: 10px 0;">
                <p id="display-celular" class="detalle-barista"></p>
                <p id="display-correo" class="detalle-barista"></p>
                <p id="display-fecha" class="detalle-barista"></p>
            </div>
            <div class="points-number" id="current-points">0</div>
            <p id="mensaje-puntos">Puntos acumulados</p>
            <p id="meta-canje" class="meta-canje"></p>

            <div id="qrcode" style="margin: 20px auto; display: flex; justify-content: center; min-height: 128px;"></div>

            <button type="button" id="btn-add-point" class="btn-registrar" style="display:none;">
                + Sumar consumo (punto)
            </button>
        </section>

        <footer>
            <button type="button" class="btn-ghost" id="btn-staff-placeholder">Acceso staff</button>
        </footer>
    </div>

    <script src="./js/main.js" defer></script>
</body>
</html>
